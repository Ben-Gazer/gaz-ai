# Himalaya email config for OpenClaw
# Deploy to: /data/.config/himalaya/config.toml inside the container
# Password file: /data/.config/himalaya/.gaz-passwd (chmod 600, contains app password)

[accounts.gazer]
email = "gaz@gazer.agency"
display-name = "Gaz AI"
default = true

backend.type = "imap"
backend.host = "imap.gmail.com"
backend.port = 993
backend.encryption.type = "tls"
backend.login = "gaz@gazer.agency"
backend.auth.type = "password"
backend.auth.cmd = "cat /data/.config/himalaya/.gaz-passwd"

message.send.backend.type = "smtp"
message.send.backend.host = "smtp.gmail.com"
message.send.backend.port = 587
message.send.backend.encryption.type = "start-tls"
message.send.backend.login = "gaz@gazer.agency"
message.send.backend.auth.type = "password"
message.send.backend.auth.cmd = "cat /data/.config/himalaya/.gaz-passwd"
